name: MILT 25 Weekly Screener

on:
  schedule:
    - cron: "30 11 * * 5"
  workflow_dispatch:
    inputs:
      params:
        description: "JSON string of strategy parameter overrides (optional)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (print signals but do not write to Supabase)"
        required: false
        default: "false"
  repository_dispatch:
    types: [run_milt25_screen]

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance supabase pandas numpy requests pyarrow

      - name: Run MILT 25 screener
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SCREEN_PARAMS: ${{ github.event.client_payload.params || github.event.inputs.params || '' }}
        run: python -m core.milt25_screener
